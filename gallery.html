<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>사진 갤러리 | 대전한우</title>
<meta name="description" content="대전한우의 한우, 대표 메뉴, 상차림, 매장 내부, 룸과 단체석, 외관과 주차장 사진을 모아 확인하세요.">
<link rel="canonical" href="gallery.html">
<meta property="og:title" content="대전한우 사진 갤러리">
<meta property="og:image" content="images/hero-main.jpg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main id="main">
  <div class="page-hero">
    <div class="container">
      <h1>사진 갤러리</h1>
      <p>한우, 상차림, 매장 공간까지 실제 사진으로 미리 만나보세요.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab is-active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="hanwoo">한우</button>
        <button class="filter-tab" data-filter="menu">대표 메뉴</button>
        <button class="filter-tab" data-filter="table">상차림</button>
        <button class="filter-tab" data-filter="family">가족 메뉴</button>
        <button class="filter-tab" data-filter="interior">매장 내부</button>
        <button class="filter-tab" data-filter="room">룸과 단체석</button>
        <button class="filter-tab" data-filter="exterior">외관과 주차장</button>
      </div>

      <div class="gallery-grid" id="galleryGrid"></div>

      <div class="load-more-wrap">
        <button class="btn btn--outline" id="loadMoreBtn">사진 더 보기</button>
      </div>
    </div>
  </section>
</main>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="닫기">&times;</button>
  <button class="lightbox-nav prev" id="lightboxPrev" aria-label="이전 사진">&#8249;</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav next" id="lightboxNext" aria-label="다음 사진">&#8250;</button>
  <p class="lightbox-caption" id="lightboxCaption"></p>
</div>

<div id="site-footer"></div>
<div id="mobile-stickybar"></div>

<script src="data/site-config.js"></script>
<script src="data/menu-data.js"></script>
<script src="data/gallery-data.js"></script>
<script src="js/common.js"></script>
<script src="js/page-render.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", ()=>{
    initGallery(GALLERY_IMAGES);
  });
</script>
</body>
</html>

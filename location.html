<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오시는 길 | 대전한우</title>
<meta name="description" content="대전한우 주소, 전화번호, 주차장 위치, 대중교통 이용 방법과 네이버지도·카카오맵 길찾기를 안내합니다.">
<link rel="canonical" href="location.html">
<meta property="og:title" content="대전한우 오시는 길">
<meta property="og:image" content="images/exterior.jpg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main id="main">
  <div class="page-hero">
    <div class="container">
      <h1>오시는 길</h1>
      <p>처음 방문하시는 분도 쉽게 찾아오실 수 있도록 안내해 드립니다.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="about-grid">
        <div class="map-wrap">
          지도 영역 (네이버지도 · 카카오맵 연동 예정)<br>실제 서비스 연동 시 이 영역에 지도가 표시됩니다.
        </div>
        <div>
          <table class="info-table">
            <tr><td>주소</td><td data-fill="address">[정보 입력]</td></tr>
            <tr><td>전화번호</td><td data-fill="phone">-</td></tr>
            <tr><td>영업시간</td><td data-fill="hours">-</td></tr>
            <tr><td>가까운 대중교통</td><td>[가까운 버스정류장 또는 지하철역 입력]</td></tr>
            <tr><td>자동차 이용 방법</td><td>[자동차 이용 방법 입력]</td></tr>
            <tr><td>주차장 위치</td><td>[주차장 위치 입력]</td></tr>
            <tr><td>주차장 입구 안내</td><td>[주차장 입구 안내 입력]</td></tr>
          </table>
          <div class="direction-actions">
            <a class="btn btn--primary" data-fill="naverMap" href="#">네이버지도 길찾기</a>
            <a class="btn btn--brass" data-fill="kakaoMap" href="#">카카오맵 길찾기</a>
            <button class="btn btn--outline" data-action="copy-address">주소 복사</button>
            <a class="btn btn--outline" data-fill="phoneHref" href="#">전화하기</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section section--alt">
    <div class="container">
      <div class="section-head section-head--center">
        <div class="eyebrow">외관과 주차장</div>
        <h2 class="section-title">매장 입구와 주차장을 미리 확인하세요</h2>
      </div>
      <div class="space-grid">
        <div class="space-card">
          <img src="images/exterior.jpg" alt="대전한우 매장 외관" loading="lazy" width="700" height="440">
          <div class="space-card-body"><h3>매장 외관</h3></div>
        </div>
        <div class="space-card">
          <img src="images/parking.jpg" alt="대전한우 주차장" loading="lazy" width="700" height="440">
          <div class="space-card-body"><h3>주차장</h3></div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<div id="mobile-stickybar"></div>

<script src="data/site-config.js"></script>
<script src="data/menu-data.js"></script>
<script src="js/common.js"></script>
<script src="js/page-render.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>예약 안내 | 대전한우</title>
<meta name="description" content="대전한우 전화 예약, 네이버 예약, 카카오톡 문의, 단체 예약 방법과 예약 가능 시간을 안내합니다.">
<link rel="canonical" href="reservation.html">
<meta property="og:title" content="대전한우 예약 안내">
<meta property="og:image" content="images/private-room.jpg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main id="main">
  <div class="page-hero">
    <div class="container">
      <h1>예약 안내</h1>
      <p>가족 모임과 단체 예약, 편한 방법으로 문의해 주세요.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="reserve-grid">
        <div class="reserve-card">
          <div class="ico">📞</div>
          <h3>전화 예약</h3>
          <p>가장 빠르고 정확한 예약 방법입니다.</p>
          <a class="btn btn--primary btn--block btn--sm" data-fill="phoneHref" href="#">전화 예약하기</a>
        </div>
        <div class="reserve-card">
          <div class="ico">🟢</div>
          <h3>네이버 예약</h3>
          <p>네이버를 통해 간편하게 예약할 수 있습니다.</p>
          <a class="btn btn--outline btn--block btn--sm" data-fill="naverBooking" href="#">네이버 예약 바로가기</a>
        </div>
        <div class="reserve-card">
          <div class="ico">💬</div>
          <h3>카카오톡 문의</h3>
          <p>카카오톡으로 편하게 문의해 주세요.</p>
          <a class="btn btn--outline btn--block btn--sm" data-fill="kakaoChannel" href="#">카카오톡 문의하기</a>
        </div>
        <div class="reserve-card">
          <div class="ico">👨‍👩‍👧‍👦</div>
          <h3>단체 예약 문의</h3>
          <p>단체 모임은 전화로 미리 문의해 주세요.</p>
          <a class="btn btn--outline btn--block btn--sm" data-fill="phoneHref" href="#">단체 예약 문의</a>
        </div>
      </div>
    </div>
  </section>

  <section class="section section--alt">
    <div class="container">
      <div class="about-grid">
        <div>
          <div class="eyebrow">예약 관련 안내</div>
          <h2 class="section-title">예약 전에 확인해 주세요</h2>
          <table class="info-table mt-24">
            <tbody id="reservationInfoTable"></tbody>
          </table>
        </div>
        <div class="about-media">
          <img src="images/private-room.jpg" alt="가족 모임 예약이 가능한 대전한우 프라이빗 룸" loading="lazy" width="800" height="600">
        </div>
      </div>
    </div>
  </section>

  <section class="section text-center">
    <div class="container">
      <h2 class="section-title">연락처 안내</h2>
      <table class="info-table mt-24" style="max-width:520px;margin:0 auto;text-align:left;">
        <tr><td>전화번호</td><td data-fill="phone">-</td></tr>
        <tr><td>네이버 예약</td><td><a data-fill="naverBooking" href="#">예약 링크 바로가기</a></td></tr>
        <tr><td>카카오톡 문의</td><td><a data-fill="kakaoChannel" href="#">문의 링크 바로가기</a></td></tr>
      </table>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<div id="mobile-stickybar"></div>

<script src="data/site-config.js"></script>
<script src="data/menu-data.js"></script>
<script src="js/common.js"></script>
<script src="js/page-render.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", ()=>{
    renderReservationInfoTable("reservationInfoTable");
  });
</script>
</body>
</html>
